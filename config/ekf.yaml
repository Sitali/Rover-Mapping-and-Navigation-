# ~/ros2_ws/src/rover_navigation/config/ekf.yaml
ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true

    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Input from Wheel Encoders
    odom0: /wheel/odometry # The topic your encoders publish on
    odom0_config:
      [true,  true,  false,  # Use X, Y position
       false, false, false,  # Don't use roll, pitch, yaw
       false, false, false,  # Don't use linear velocities
       false, false, true,   # Don't use angular vel X/Y, but DO use angular vel Z (yaw rate)
       false, false, false]

    # Input from the IMU
    imu0: /imu/data # The topic your IMU publishes on
    imu0_config:
      [false, false, false, # Don't use X, Y, Z position from IMU
       true,  true,  true,  # DO use roll, pitch, yaw orientation
       false, false, false, # Don't use linear velocities
       true,  true,  true,  # DO use angular velocities
       false, false, false]